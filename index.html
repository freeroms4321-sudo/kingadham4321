</head>
<body>
    <header class="head Logo">
        <nav class="content" >
            <div class="Logo">
                <h1 class="Logo1">Course Organizor</h1>
                <p class="Logo1">Add Courses</p>
                <p class="Logo2">You Can Add Here </p>
            </div>
            <ul>
                <li> 
                    <a href="Home.html">Home</a>
                </li>
                <li>
                    <a href="Add Courses.html">Add Courses</a>

                <li>

        </nav>
        <div class="description">
            <h1>Add Your Courses </h1>
            <p> Please fill in the data </p>
        </div>
    </header>
    <main class="information">
        <section class="information-form">
            <form class="the-info">
                <div class="info">
                    <div class="data">
                        <label>Course Name</label>
                        <input type="text" name="Course Name" placeholder="Enter Course Name" required>
                        <label>Course Code</label>
                        <input type="text" name="Course Code" placeholder="Enter Course Code"required>
                        <label>Instructor Name</label>
                        <input type="text" name="Instructor Name" placeholder="Enter Name Of Instructor "required>
                        <label>Hours Of Course</label>
                        <input type="number" name="Hours Of Course" placeholder="Enter Hours of Course"required  max="3"  min="1">
                        <label>note</label>
                        <textarea name="note"></textarea>
                    </div>
                </div>
                <button type="submit">Add Now</button>
                <button type="reset"> reset</button>
            </form>
        </section>
    </main>
    <footer>
